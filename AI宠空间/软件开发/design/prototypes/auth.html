<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI宠空间 · 登录与注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tokens.css">
</head>
<body class="text-slate-100">
  <div class="max-w-[1200px] mx-auto p-4 md:p-6 xl:p-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
      <section class="token-card p-4 md:p-6">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-emerald-400/20 text-emerald-300 flex items-center justify-center"><i class="fa-solid fa-paw"></i></div>
          <div>
            <h1 class="text-xl font-bold">用户账户中心</h1>
            <p class="text-sm text-slate-400">商用级注册与登录流程</p>
          </div>
        </div>
        <div class="mt-4 rounded-xl overflow-hidden border border-slate-700 bg-slate-900/70">
          <div class="grid grid-cols-2 p-1 gap-1" id="authTabs">
            <button class="auth-tab bg-emerald-500/20 text-emerald-300 rounded-lg py-2 text-sm font-semibold" data-target="loginPanel">登录</button>
            <button class="auth-tab text-slate-300 rounded-lg py-2 text-sm font-semibold hover:bg-slate-800" data-target="registerPanel">注册</button>
          </div>
        </div>
        <div id="loginPanel" class="mt-4 space-y-3">
          <div>
            <label class="text-sm text-slate-300" for="loginPhone">手机号</label>
            <input id="loginPhone" class="ui-input mt-2" type="tel" placeholder="请输入手机号">
          </div>
          <div>
            <label class="text-sm text-slate-300" for="loginCode">验证码</label>
            <div class="mt-2 grid grid-cols-[1fr_112px] gap-2">
              <input id="loginCode" class="ui-input" type="text" placeholder="6位验证码">
              <button class="ui-btn border border-slate-600 bg-slate-800 hover:bg-slate-700 text-slate-100">获取验证码</button>
            </div>
          </div>
          <button id="loginBtn" class="ui-btn ui-btn-primary w-full">登录并进入用户端</button>
          <div id="loginStatus" class="text-xs text-slate-400">支持手机号快捷登录</div>
        </div>
        <div id="registerPanel" class="mt-4 space-y-3 hidden">
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-sm text-slate-300" for="registerName">昵称</label>
              <input id="registerName" class="ui-input mt-2" type="text" placeholder="如：李女士">
            </div>
            <div>
              <label class="text-sm text-slate-300" for="registerPhone">手机号</label>
              <input id="registerPhone" class="ui-input mt-2" type="tel" placeholder="请输入手机号">
            </div>
          </div>
          <div>
            <label class="text-sm text-slate-300" for="registerPassword">密码</label>
            <input id="registerPassword" class="ui-input mt-2" type="password" placeholder="8位以上，含字母与数字">
          </div>
          <div>
            <label class="text-sm text-slate-300" for="registerPet">首只宠物昵称</label>
            <input id="registerPet" class="ui-input mt-2" type="text" placeholder="如：小花">
          </div>
          <button id="registerBtn" class="ui-btn ui-btn-primary w-full">完成注册并创建账户</button>
          <div id="registerStatus" class="text-xs text-slate-400">注册成功后自动创建基础会员档案</div>
        </div>
      </section>

      <section class="token-card p-4 md:p-6">
        <h2 class="text-lg font-bold">交互流程说明</h2>
        <div class="mt-4 space-y-3">
          <div class="rounded-xl border border-slate-700 bg-slate-900/70 p-3">
            <div class="text-sm font-semibold">登录流程</div>
            <div class="text-xs text-slate-400 mt-1">输入手机号 → 获取验证码 → 校验成功 → 进入首页</div>
          </div>
          <div class="rounded-xl border border-slate-700 bg-slate-900/70 p-3">
            <div class="text-sm font-semibold">注册流程</div>
            <div class="text-xs text-slate-400 mt-1">填写基础信息 → 设置密码 → 创建宠物档案 → 账户初始化</div>
          </div>
          <div class="rounded-xl border border-slate-700 bg-slate-900/70 p-3">
            <div class="text-sm font-semibold">状态覆盖</div>
            <div class="text-xs text-slate-400 mt-1">默认、焦点、校验错误、提交加载、成功反馈全覆盖</div>
          </div>
        </div>
        <div class="mt-4 rounded-xl overflow-hidden border border-slate-700">
          <img src="https://images.unsplash.com/photo-1450778869180-41d0601e046e?auto=format&fit=crop&w=1200&q=80" alt="宠物应用登录界面视觉参考" class="w-full h-64 object-cover">
        </div>
      </section>
    </div>
  </div>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
