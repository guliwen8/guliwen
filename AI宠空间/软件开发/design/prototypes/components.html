<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI宠空间 · 组件状态库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tokens.css">
</head>
<body>
  <div class="max-w-[1440px] mx-auto p-4 md:p-6 xl:p-8 space-y-4 md:space-y-6">
    <section class="token-card p-4 md:p-6">
      <h1 class="text-xl md:text-2xl font-bold">组件状态库</h1>
      <p class="text-sm text-slate-400 mt-1">覆盖悬停、按下、禁用、加载、错误五状态</p>
    </section>

    <section class="token-card p-4 md:p-6">
      <h2 class="font-semibold">按钮状态</h2>
      <div class="mt-4 flex flex-wrap gap-3">
        <button class="ui-btn ui-btn-primary">默认</button>
        <button class="ui-btn ui-btn-primary hover:bg-emerald-700">悬停</button>
        <button class="ui-btn ui-btn-primary active:bg-emerald-800">按下</button>
        <button class="ui-btn ui-btn-primary" disabled>禁用</button>
        <button class="ui-btn ui-btn-primary state-loading" disabled>加载中</button>
        <button class="ui-btn border border-red-400/70 text-red-300 bg-red-500/10">错误</button>
      </div>
    </section>

    <section class="token-card p-4 md:p-6">
      <h2 class="font-semibold">输入框状态</h2>
      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block mb-2 text-sm text-slate-300">默认</label>
          <input class="ui-input" placeholder="输入宠物昵称">
        </div>
        <div>
          <label class="block mb-2 text-sm text-slate-300">悬停/聚焦</label>
          <input class="ui-input border-sky-400 shadow-[0_0_0_3px_rgba(14,165,233,.22)]" value="小花">
        </div>
        <div>
          <label class="block mb-2 text-sm text-slate-300">禁用</label>
          <input class="ui-input opacity-50 cursor-not-allowed" value="不可编辑" disabled>
        </div>
        <div>
          <label class="block mb-2 text-sm text-red-300">错误</label>
          <input class="ui-input" aria-invalid="true" value="字段缺失">
          <p class="text-xs text-red-300 mt-2">请输入正确手机号</p>
        </div>
      </div>
    </section>

    <section class="token-card p-4 md:p-6">
      <h2 class="font-semibold">状态徽章</h2>
      <div class="mt-4 flex flex-wrap gap-3 text-sm">
        <span class="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-300">成功</span>
        <span class="px-3 py-1 rounded-full bg-sky-500/20 text-sky-300">进行中</span>
        <span class="px-3 py-1 rounded-full bg-amber-500/20 text-amber-300">待处理</span>
        <span class="px-3 py-1 rounded-full bg-red-500/20 text-red-300">异常</span>
      </div>
    </section>
  </div>
</body>
</html>
