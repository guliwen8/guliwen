<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI宠空间 · 375画板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tokens.css">
</head>
<body class="bg-[#070B14] text-slate-100">
  <div class="mx-auto w-[375px] min-h-screen p-4 space-y-4">
    <div class="token-card p-4">
      <div class="text-xs text-slate-400">375 / 750 画板</div>
      <h1 class="text-xl font-bold mt-1">用户端首页</h1>
    </div>
    <div class="token-card p-4 space-y-3">
      <span class="inline-flex px-3 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-300">智能寄存</span>
      <h2 class="text-2xl font-extrabold leading-tight">爱宠托管更安心</h2>
      <p class="text-sm text-slate-300">8pt栅格，移动优先，聚焦高频预约与状态回传。</p>
      <button class="ui-btn ui-btn-primary w-full">立即预约</button>
    </div>
    <div class="token-card p-4">
      <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=900&q=80" alt="小狗特写" class="w-full h-44 object-cover rounded-xl">
    </div>
    <div class="token-card p-4 space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-sm">A03柜</span>
        <span class="text-xs px-2 py-1 rounded-full bg-emerald-500/20 text-emerald-300">正常</span>
      </div>
      <div class="h-2 bg-slate-700 rounded-full">
        <div class="h-2 w-4/5 rounded-full bg-emerald-400"></div>
      </div>
      <div class="text-xs text-slate-400">温度24°C · 湿度52%</div>
    </div>
  </div>
</body>
</html>
