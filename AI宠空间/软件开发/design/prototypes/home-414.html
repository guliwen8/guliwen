<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI宠空间 · 414画板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tokens.css">
</head>
<body class="bg-[#070B14] text-slate-100">
  <div class="mx-auto w-[414px] min-h-screen p-4 space-y-4">
    <div class="token-card p-4">
      <div class="text-xs text-slate-400">414 / 828 画板</div>
      <h1 class="text-xl font-bold mt-1">用户端首页</h1>
    </div>
    <div class="token-card p-4 space-y-3">
      <span class="inline-flex px-3 py-1 rounded-full text-xs bg-sky-500/20 text-sky-300">智能看护</span>
      <h2 class="text-2xl font-extrabold leading-tight">同城寄存高频可用</h2>
      <p class="text-sm text-slate-300">适配414宽度信息密度，提升预约效率与状态可读性。</p>
      <div class="grid grid-cols-2 gap-3">
        <button class="ui-btn ui-btn-primary">立即预约</button>
        <button class="ui-btn border border-slate-600 bg-slate-800/70">查看订单</button>
      </div>
    </div>
    <div class="token-card p-4">
      <img src="https://images.unsplash.com/photo-1537151625747-768eb6cf92b2?auto=format&fit=crop&w=900&q=80" alt="猫咪特写" class="w-full h-48 object-cover rounded-xl">
    </div>
    <div class="token-card p-4 space-y-3">
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="rounded-lg bg-slate-800 p-3"><div class="text-slate-400 text-xs">今日订单</div><div class="text-lg font-bold mt-1">138</div></div>
        <div class="rounded-lg bg-slate-800 p-3"><div class="text-slate-400 text-xs">复购率</div><div class="text-lg font-bold mt-1">16%</div></div>
      </div>
    </div>
  </div>
</body>
</html>
