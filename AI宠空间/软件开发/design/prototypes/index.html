<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI宠空间 · 高保真总览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tokens.css">
</head>
<body>
  <div class="max-w-[1480px] mx-auto p-4 md:p-6 xl:p-8">
    <header class="token-card p-4 md:p-6">
      <h1 class="text-xl md:text-2xl font-bold">AI宠空间高保真设计总览</h1>
      <p class="text-sm text-slate-300 mt-2">入口文件集成用户端、运营后台、组件状态库与375/414独立画板，支持走查与开发联调。</p>
      <div class="mt-3 text-xs text-slate-400">断点：375/750 · 414/828 · 768/1536 · 1440/2880</div>
    </header>

    <section class="mt-4 md:mt-6 space-y-4 md:space-y-6">
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">用户端首页</h2>
        <iframe src="./home.html" title="用户端首页原型" class="w-full h-[860px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">注册/登录模块</h2>
        <iframe src="./auth.html" title="用户端注册登录原型" class="w-full h-[860px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">375画板</h2>
        <iframe src="./home-375.html" title="375画板原型" class="w-full h-[900px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">414画板</h2>
        <iframe src="./home-414.html" title="414画板原型" class="w-full h-[920px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">运营后台</h2>
        <iframe src="./admin.html" title="运营后台原型" class="w-full h-[860px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
      <article class="token-card p-3 md:p-4">
        <h2 class="text-base font-semibold mb-3">组件状态库</h2>
        <iframe src="./components.html" title="组件状态库原型" class="w-full h-[700px] rounded-xl border border-slate-700 bg-slate-900"></iframe>
      </article>
    </section>
  </div>
</body>
</html>
