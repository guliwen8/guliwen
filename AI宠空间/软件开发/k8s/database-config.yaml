apiVersion: v1
kind: Secret
metadata:
  name: petcare-db-secret
type: Opaque
stringData:
  postgres-password: "petcare_pass"
  postgres-user: "petcare_user"
  jwt-secret: "your_super_secret_key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: petcare-config
data:
  POSTGRES_DB: "petcare_db"
  POSTGRES_HOST: "petcare-db-service"
  REDIS_HOST: "petcare-redis-service"
  NEXT_PUBLIC_API_URL: "https://api.petcare.ai/v1"
---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: petcare-db-service
spec:
  selector:
    app: petcare-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
# PostgreSQL Deployment (Simplified for testing/staging)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petcare-db
  template:
    metadata:
      labels:
        app: petcare-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: petcare-db-secret
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: petcare-db-secret
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: petcare-config
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {} # Note: In production, use PersistentVolumeClaim (EBS/EFS)
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: petcare-redis-service
spec:
  selector:
    app: petcare-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petcare-redis
  template:
    metadata:
      labels:
        app: petcare-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

