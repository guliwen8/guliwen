apiVersion: apps/v1
kind: Deployment
metadata:
  name: petcare-frontend
  labels:
    app: petcare-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petcare-frontend
  template:
    metadata:
      labels:
        app: petcare-frontend
    spec:
      containers:
      - name: petcare-frontend
        image: <IMAGE_TAG> # To be replaced by GitHub Actions
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: petcare-config
              key: NEXT_PUBLIC_API_URL
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: petcare-frontend-service
spec:
  selector:
    app: petcare-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
